<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Come Out Singin' - Karaoke Competition Voting">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Come Out Singin'">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Come Out Singin'</title>
  <link rel="manifest" href="manifest.json">

  <!-- Theme color for browser chrome -->
  <meta name="theme-color" content="#E91E63">

  <!-- Google Sign-In Client ID -->
  <meta name="google-signin-client_id" content="381810584800-8024cbgq7tl3g23ofc17nvmmhuoe5tqa.apps.googleusercontent.com">

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    /* Loading overlay to prevent flicker during app initialization */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.3s;
    }

    .loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(233, 30, 99, 0.2);
      border-top-color: #E91E63;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading overlay shown while Flutter initializes -->
  <div class="loading" id="loading-overlay">
    <div class="loading-spinner"></div>
  </div>

  <script>
    // Remove loading overlay when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('fade-out');
        setTimeout(function() {
          overlay.remove();
        }, 300);
      }
    });

    // Fallback: remove after 5 seconds if event doesn't fire
    setTimeout(function() {
      var overlay = document.getElementById('loading-overlay');
      if (overlay && !overlay.classList.contains('fade-out')) {
        overlay.classList.add('fade-out');
        setTimeout(function() {
          overlay.remove();
        }, 300);
      }
    }, 5000);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
