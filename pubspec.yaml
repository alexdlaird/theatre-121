name: theatre_121
description: "Come Out Singin' - A karaoke competition voting app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.0
  cloud_firestore: ^5.5.0
  firebase_auth: ^5.3.0

  # Google Sign-In & APIs
  google_sign_in: ^6.2.0
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0

  # State Management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Routing
  go_router: ^15.1.0

  # QR Code generation
  qr_flutter: ^4.1.0

  # Utilities
  uuid: ^4.5.0
  intl: ^0.20.2
  collection: ^1.19.0

  # UI
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  image_path: "assets/img/cos-logo.webp"
  web:
    generate: true
    image_path: "assets/img/cos-logo.webp"
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter:
  uses-material-design: true

  assets:
    - assets/img/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
